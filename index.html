<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Familiares</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = 'https://fvugphfurbdtpoldnfhs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_GJmq_usXU18pNLBvesw3DQ_JHLwh0Xp';
        
        // Creamos el cliente apenas carga el navegador
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Función de login obligatoria
        async function login() {
            console.log("Botón detectado");
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + window.location.pathname
                }
            });
            if (error) alert("Error: " + error.message);
        }

        // Vigilante de sesión
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
            }
        });
    </script>

    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="auth-overlay" style="display: flex; flex-direction: column; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f8fafc; z-index: 9999;">
        <div style="background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center;">
            <h1 style="margin-bottom: 20px;">Finanzas Familiares</h1>
            <button onclick="login()" style="padding: 12px 24px; cursor: pointer; display: flex; align-items: center; gap: 10px; border: 1px solid #ddd; background: white; border-radius: 8px;">
                <img src="https://www.google.com/favicon.ico" width="18">
                Continuar con Google
            </button>
        </div>
    </div>

    <div id="main-app" style="display: none; flex-direction: column; padding: 20px;">
        <h2>¡Bienvenido al Dashboard!</h2>
        <p>Si ves esto, el login funcionó.</p>
        <button onclick="supabaseClient.auth.signOut().then(() => location.reload())">Cerrar Sesión</button>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
