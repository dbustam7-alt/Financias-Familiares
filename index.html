<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Financiero Personal | DataxIA</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* Estilos rápidos para la pantalla de bloqueo */
        #auth-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f8fafc;
            z-index: 9999;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }
        #btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            margin-top: 20px;
        }
        #btn-google:hover {
            background: #f1f5f9;
            transform: translateY(-1px);
        }
        .app-container {
            display: none; /* Se activa por JS tras el login */
        }
    </style>
</head>

<body>
    <div id="auth-overlay">
        <div class="login-card">
            <i data-lucide="wallet" style="width: 48px; height: 48px; color: #2563eb; margin: 0 auto 16px;"></i>
            <h1 style="font-family: 'Outfit', sans-serif; font-size: 1.5rem; color: #1e293b;">Finanzas Familiares</h1>
            <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 8px;">Gestiona el presupuesto familiar con IA</p>
            <button id="btn-google" onclick="login()">
                <img src="https://www.google.com/favicon.ico" alt="G" style="width:18px; margin-right:12px;">
                Continuar con Google
            </button>
        </div>
    </div>

    <div class="app-container" id="main-app">
        <aside class="sidebar">
            <div class="logo">
                <i data-lucide="wallet" class="logo-icon"></i>
                <span>Finanzas</span>
            </div>
            <nav id="sidebar-nav">
                <a href="#" class="active" data-view="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</a>
                <a href="#" data-view="ingresos"><i data-lucide="arrow-up-right"></i> Ingresos</a>
                <a href="#" data-view="gastos"><i data-lucide="arrow-down-left"></i> Gastos</a>
                <a href="#" data-view="tarjetas"><i data-lucide="credit-card"></i> Tarjetas</a>
                <a href="#" data-view="configuraciones"><i data-lucide="settings"></i> Ajustes</a>
            </nav>
            <div style="padding: 20px; margin-top: auto;">
                <button onclick="logout()" style="background: none; border: none; color: #ef4444; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                    <i data-lucide="log-out" style="width: 18px;"></i> Salir
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-info">
                    <h1>Control de Finanzas</h1>
                    <div class="profile-filter" id="profile-selector">
                        <button class="filter-btn active" data-filter="familia">Familia</button>
                        <button class="filter-btn" data-filter="laura">Laura</button>
                        <button class="filter-btn" data-filter="david">David</button>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="quick-add-btn" class="btn btn-primary">
                        <i data-lucide="plus"></i> Registro Rápido
                    </button>
                </div>
            </header>

            <div id="view-dashboard" class="view active">
                <section class="summary-section">
                    <div class="card card-summary income">
                        <div class="card-icon"><i data-lucide="trending-up"></i></div>
                        <div class="card-data">
                            <span class="label">Ingresos Totales</span>
                            <h2 id="total-income">$0</h2>
                        </div>
                    </div>
                    <div class="card card-summary expenses">
                        <div class="card-icon"><i data-lucide="trending-down"></i></div>
                        <div class="card-data">
                            <span class="label">Gastos Totales</span>
                            <h2 id="total-expenses">$0</h2>
                        </div>
                    </div>
                    <div class="card card-summary balance highlighted">
                        <div class="card-icon"><i data-lucide="banknote"></i></div>
                        <div class="card-data">
                            <span class="label">
