<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Familiares | DataxIA</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div id="auth-overlay" style="display: flex; flex-direction: column; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f8fafc; z-index: 9999;">
        <div style="background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center;">
            <h1 style="margin-bottom: 24px;">Finanzas Familiares</h1>
            <button onclick="loginConGoogle()" style="display: flex; align-items: center; padding: 12px 24px; cursor: pointer; border: 1px solid #ddd; background: white; border-radius: 8px;">
                <img src="https://www.google.com/favicon.ico" width="18" style="margin-right:12px;">
                Continuar con Google
            </button>
        </div>
    </div>

    <div id="main-app" style="display: none;">
        <div style="padding: 20px;">
            <h2 id="saludo-usuario">Cargando...</h2>
            <button onclick="cerrarSesion()" style="color: red; cursor: pointer;">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN TÉCNICA
        const SUPABASE_URL = 'https://fvugphfurbdtpoldnfhs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_GJmq_usXU18pNLBvesw3DQ_JHLwh0Xp';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // FUNCIÓN: Iniciar Sesión
        async function loginConGoogle() {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: { 
                    redirectTo: window.location.origin + window.location.pathname 
                }
            });
            if (error) console.error("Error al iniciar:", error.message);
        }

        // FUNCIÓN: Cerrar Sesión
        async function cerrarSesion() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        // EL "CEREBRO": Detecta si el usuario ya entró
        supabaseClient.auth.onAuthStateChange((event, session) => {
            const authOverlay = document.getElementById('auth-overlay');
            const mainApp = document.getElementById('main-app');
            const saludo = document.getElementById('saludo-usuario');

            if (session) {
                // Si hay usuario: Ocultamos login y mostramos App
                authOverlay.style.display = 'none';
                mainApp.style.display = 'block';
                saludo.innerText = "Hola, " + session.user.email;
                console.log("Usuario detectado correctamente");
            } else {
                // Si no hay usuario: Mostramos login
                authOverlay.style.display = 'flex';
                mainApp.style.display = 'none';
            }
        });

        // Cargar iconos de Lucide
        lucide.createIcons();
    </script>
</body>
</html>
